<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智游镜 | AI + 游戏情报每日简报 & 每周精选</title>
  <!-- 引入样式表 -->
  <link rel="stylesheet" href="display/css/style.css">
</head>
<body>
  <aside class="sidebar is-open" id="app-sidebar" aria-label="展示控制栏">
    <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="收起侧边栏" aria-expanded="true">
      <span class="toggle-open">‹</span>
      <span class="toggle-closed">›</span>
    </button>

    <div class="sidebar-content">
      <header class="app-header">
        <div class="header-logo-section">
          <div class="logo-icon">
            <!-- 智游镜雷达 Logo 图标 -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
              <path d="M2 12h20"></path>
            </svg>
          </div>
          <div class="logo-text">
            <h1>智游镜</h1>
            <p>AI + 游戏情报每日简报</p>
          </div>
        </div>
      </header>

      <div class="sidebar-status">
        <div class="status-tag">
          <span class="pulse-dot"></span>
          <span>系统正常运行中</span>
        </div>
      </div>

      <nav class="sidebar-actions" aria-label="快捷操作">
        <a href="project-flow.html" target="_blank" class="flowchart-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
            <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
            <polyline points="2 17 12 22 22 17"></polyline>
            <polyline points="2 12 12 17 22 12"></polyline>
          </svg>
          <span>查看项目流程图</span>
        </a>
      </nav>

      <section class="control-panel" aria-label="报告筛选">
        <!-- 报告类型 Tab 容器 -->
        <div id="tab-container"></div>

        <!-- 日期按钮容器 -->
        <div id="date-container"></div>
      </section>

      <footer class="app-footer">
        <p>© 2026 智游镜系统</p>
        <p><a href="https://github.com/likeUMR/ai-game-news-daily" target="_blank">GitHub Repository</a></p>
      </footer>
    </div>
  </aside>

  <!-- 报告内容展示区：主体直接显示生成的原始 HTML -->
  <main class="report-main">
    <section id="viewer-container"></section>
  </main>

  <!-- 引入模块化入口 JavaScript -->
  <script type="module" src="display/js/main.js"></script>
</body>
</html>
